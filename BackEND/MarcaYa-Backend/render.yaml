services:
  - type: web
    name: marcaya-backend
    runtime: docker
    repo: https://github.com/Sebastian-D-Candiotti/G3-MarcaYa
    dockerfilePath: ./Dockerfile.render
    dockerContext: ./BackEND/MarcaYa-Backend
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: FCM_SERVER_KEY
        sync: false
